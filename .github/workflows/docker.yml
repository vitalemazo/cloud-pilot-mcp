name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: cloud-pilot-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mirror-to-private-registry:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Mirror image to private registry
        run: |
          skopeo copy --all \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ secrets.PRIVATE_REGISTRY_USER }}:${{ secrets.PRIVATE_REGISTRY_PASS }}" \
            --dest-tls-verify=false \
            "docker://${{ env.GHCR_REGISTRY }}/${{ github.repository }}:latest" \
            "docker://${{ secrets.PRIVATE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"

      - name: Mirror SHA tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          skopeo copy --all \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ secrets.PRIVATE_REGISTRY_USER }}:${{ secrets.PRIVATE_REGISTRY_PASS }}" \
            --dest-tls-verify=false \
            "docker://${{ env.GHCR_REGISTRY }}/${{ github.repository }}:${SHORT_SHA}" \
            "docker://${{ secrets.PRIVATE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
