name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Smoke test (server starts and responds)
        run: |
          CLOUD_PILOT_SPECS_DYNAMIC=false TRANSPORT=http HTTP_HOST=127.0.0.1 HTTP_PORT=8400 \
            node dist/index.js &
          sleep 3
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8400/health)
          kill %1 2>/dev/null
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP 200)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
